<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Romania | Hub Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { 
            --verde: #2ecc71; --rosu: #e74c3c; --bg: #0a0a0a; --panel: #111; 
            --border: #222; --discord: #7289da; --glow: 0 0 20px rgba(46, 204, 113, 0.4); 
        }
        * { box-sizing: border-box; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Rajdhani', sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; background-image: radial-gradient(circle at 50% -20%, #1a3a2a, #0a0a0a); }
        .sidebar { width: 280px; background: rgba(0,0,0,0.8); border-right: 2px solid var(--verde); display: flex; flex-direction: column; backdrop-filter: blur(10px); z-index: 100; }
        .logo { padding: 40px 20px; font-size: 42px; font-weight: 800; color: var(--verde); text-align: center; letter-spacing: 5px; text-shadow: var(--glow); }
        .nav-item { padding: 18px 30px; cursor: pointer; border-left: 5px solid transparent; color: #555; font-weight: 700; font-size: 16px; margin: 5px 10px; border-radius: 0 10px 10px 0; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); transform: translateX(5px); }
        .nav-item.active { color: white; background: rgba(46, 204, 113, 0.15); border-left-color: var(--verde); }
        .nav-admin { border-left-color: var(--rosu) !important; color: #ff7675; }
        .main { flex: 1; padding: 50px; overflow-y: auto; position: relative; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 20px; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-family: 'Rajdhani'; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-buy { background: var(--verde); color: black; }
        .btn-danger { background: var(--rosu); color: white; }
        .input-box { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; font-family: 'Rajdhani'; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal { background: #0a0a0a; border: 2px solid var(--verde); padding: 40px; border-radius: 25px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .admin-section { background:#080808; padding:20px; border-radius:15px; border:1px solid #222; margin-bottom:20px; }
        .req-item { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div id="notif-container" style="position:fixed; top:30px; right:30px; z-index:10000;"></div>

    <div id="login-screen" style="position:fixed; inset:0; background:#000; z-index:10001; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center;">
            <h1 style="color:var(--verde); font-size:70px; letter-spacing:15px;">SLIDE</h1>
            <button onclick="login()" class="btn" style="background:var(--discord); color:white; width:auto; padding: 18px 60px;">AUTENTIFICARE DISCORD</button>
        </div>
    </div>

    <div id="admin-modal" class="overlay">
        <div class="modal">
            <h2 style="color:var(--verde);">⚙️ PANOU FONDATOR</h2>
            
            <div class="admin-section">
                <h4>CREDITE MANUALE</h4>
                <input type="text" id="adm-uid" class="input-box" placeholder="Discord ID">
                <input type="text" id="adm-amt" class="input-box" placeholder="Suma">
                <input type="email" id="adm-email" class="input-box" placeholder="Email (notificare)">
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-buy" onclick="adminActionManual('add')">ADĂUGĂ</button>
                    <button class="btn btn-danger" onclick="adminActionManual('remove')">SCOATE</button>
                </div>
            </div>

            <div class="admin-section">
                <h4>CUPOANE</h4>
                <input type="text" id="new-coupon-name" class="input-box" placeholder="NUME COD">
                <input type="text" id="new-coupon-percent" class="input-box" placeholder="PROCENT %">
                <button class="btn btn-buy" onclick="addPromoCode()">CREEAZĂ</button>
                <div id="coupon-list" style="margin-top:10px;"></div>
            </div>

            <h4>CERERI DOVEZI</h4>
            <div id="admin-req-list"></div>
            
            <button class="btn" style="background:#222; color:white; margin-top:20px;" onclick="closeModal('admin-modal')">ÎNCHIDE</button>
        </div>
    </div>

    <div id="confirm-modal" class="overlay">
        <div class="modal">
            <h2>CONFIRMĂ ACHIZIȚIA</h2>
            <p id="conf-desc"></p>
            <input type="text" id="shop-id-verify" class="input-box" placeholder="ID JOC">
            <input type="text" id="shop-coupon" class="input-box" placeholder="CUPON REDUCERE">
            <span id="coupon-status" style="display:block; margin-bottom:10px;"></span>
            <button class="btn btn-buy" id="confirm-yes-btn">CUMPĂRĂ</button>
            <button class="btn" onclick="closeModal('confirm-modal')">ANULEAZĂ</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="logo">SLIDE</div>
        <div class="nav-item active" onclick="showPage('home')">🏠 HOME</div>
        <div class="nav-item" onclick="showPage('confirm')">📸 CONFIRMĂ PLATA</div>
        <div class="nav-item" onclick="showPage('vip')">⭐ VIP</div>
        <div class="nav-item nav-admin" onclick="openAdminWithPass()">⚙️ ADMIN</div>
        <div style="margin-top:auto; padding:20px;">
            <span id="u-name">...</span><br>
            <span id="u-credits" style="color:var(--verde); font-weight:800;">0</span> Cr
            <button onclick="logout()" class="btn" style="font-size:10px; margin-top:10px; padding:5px;">LOGOUT</button>
        </div>
    </div>

    <div class="main">
        <div id="home" class="page active"><div class="card"><h1>BINE AI REVENIT</h1><p>Mergi la "Confirmă Plata" dacă ai donat pe TipeeeStream.</p></div></div>
        
        <div id="confirm" class="page">
            <div class="card">
                <h3>TRIMITE DOVADA</h3>
                <input type="email" id="d-email" class="input-box" placeholder="Email">
                <input type="text" id="d-idj" class="input-box" placeholder="ID JOC">
                <input type="text" id="d-amt" class="input-box" placeholder="Suma Credite">
                <input type="file" id="d-file" class="input-box">
                <button class="btn btn-buy" onclick="sendDovada()">TRIMITE</button>
            </div>
        </div>

        <div id="vip" class="page">
            <div class="card"><h3>VIP GOLD</h3><p>5000 Cr</p><button class="btn btn-buy" onclick="askBuy('VIP GOLD', 5000)">CUMPARA</button></div>
        </div>
    </div>

    <script>
        const WH_LOGS = "https://discord.com/api/webhooks/1500603387375386654/BP-Zi7QXZMRQk_8Ivb7JWFrXjAv-Hyr7xqjI_D0G0SQq1_Epi6K3rx55AZGQsFspXcDG";
        const WH_SHOP = "https://discord.com/api/webhooks/1500603878700482700/SZ_VEigE64-1tAHIKrxsAwnscWnYsmb1q4Xv5M-h4r28EY0q0Zf2ixu1qAiNE6z2CrH0";
        const ADMIN_PASS = "ss-croc";

        firebase.initializeApp({ databaseURL: "https://slideromania-7db7d-default-rtdb.europe-west1.firebasedatabase.app" });
        const db = firebase.database();
        emailjs.init("j1cFRV1nuCdva_QHu");

        let user = null;
        let activePromoCodes = {};

        // Incarcare Date
        db.ref('promo_codes').on('value', s => { activePromoCodes = s.val() || {}; updateCouponList(); });

        function notify(t) { 
            const n = document.createElement('div'); n.innerText = t; 
            n.style = "background:#222; color:white; padding:15px; border-radius:10px; margin-bottom:5px; border-left:4px solid var(--verde);";
            document.getElementById('notif-container').appendChild(n); setTimeout(()=>n.remove(), 4000);
        }

        async function checkAuth() {
            const t = new URLSearchParams(window.location.hash.slice(1)).get('access_token');
            if(t) {
                const r = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${t}` } });
                user = await r.json();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('u-name').innerText = user.username.toUpperCase();
                db.ref('users/' + user.id + '/credits').on('value', s => document.getElementById('u-credits').innerText = (s.val() || 0));
            }
        }

        // DOVEZI (Functia care iti lipsea)
        async function sendDovada() {
            const email = document.getElementById('d-email').value;
            const idj = document.getElementById('d-idj').value;
            const amt = document.getElementById('d-amt').value;
            const file = document.getElementById('d-file').files[0];
            if(!email || !idj || !amt || !file) return notify("DATE INCOMPLETE!");

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const rid = Date.now();
                await db.ref('pending_donations/' + rid).set({
                    uid: user.id, username: user.username, email: email, idj: idj, amount: parseInt(amt), img: reader.result
                });
                notify("DOVADA TRIMISĂ!");
            };
        }

        // ADMIN REQS LOAD
        function loadAdminReqs() {
            db.ref('pending_donations').on('value', s => {
                const list = document.getElementById('admin-req-list'); list.innerHTML = "";
                const data = s.val(); if(!data) return list.innerHTML = "Fără cereri.";
                Object.keys(data).forEach(id => {
                    const r = data[id];
                    const d = document.createElement('div'); d.className = "req-item";
                    d.innerHTML = `<img src="${r.img}" style="width:100px;"><p>${r.username} - ${r.amount} Cr</p>
                    <button class="btn btn-buy" onclick="adminApprove('${id}', true)">APROBĂ</button>
                    <button class="btn btn-danger" onclick="adminApprove('${id}', false)">REGINSĂ</button>`;
                    list.appendChild(d);
                });
            });
        }

        async function adminApprove(rid, status) {
            const s = await db.ref('pending_donations/' + rid).once('value');
            const r = s.val();
            if(status) {
                const us = await db.ref('users/' + r.uid + '/credits').once('value');
                await db.ref('users/' + r.uid).update({ credits: (us.val() || 0) + r.amount });
                if(r.email) emailjs.send("service_2gd65tf", "template_750es5r", { to_email: r.email, amount: r.amount });
            }
            await db.ref('pending_donations/' + rid).remove();
            notify("CERERE FINALIZATĂ!");
        }

        // RESTUL FUNCTIILOR
        function askBuy(name, price) {
            document.getElementById('conf-desc').innerText = `Cumperi ${name}?`;
            const status = document.getElementById('coupon-status');
            document.getElementById('shop-coupon').oninput = (e) => {
                const c = e.target.value.toUpperCase();
                if(activePromoCodes[c]) {
                    const p = activePromoCodes[c].percent;
                    status.innerText = `REDUCERE ${p}% | FINAL: ${Math.floor(price * (1-p/100))} Cr`;
                } else status.innerText = `PREȚ: ${price} Cr`;
            };
            document.getElementById('confirm-modal').style.display = 'flex';
            document.getElementById('confirm-yes-btn').onclick = () => finalizeBuy(name, price);
        }

        async function finalizeBuy(name, price) {
            const idj = document.getElementById('shop-id-verify').value;
            const c = document.getElementById('shop-coupon').value.toUpperCase();
            let final = price;
            if(activePromoCodes[c]) final = Math.floor(price * (1 - activePromoCodes[c].percent/100));
            
            const s = await db.ref('users/' + user.id + '/credits').once('value');
            if((s.val()||0) < final) return notify("CREDITE INSUFICIENTE!");

            await db.ref('users/' + user.id).update({ credits: s.val() - final });
            fetch(WH_SHOP, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({content: `🛒 <@${user.id}> a cumpărat **${name}** (ID Joc: ${idj})`})});
            closeModal('confirm-modal'); notify("ACHIZIȚIE REUȘITĂ!");
        }

        async function adminActionManual(type) {
            const uid = document.getElementById('adm-uid').value;
            const amt = parseInt(document.getElementById('adm-amt').value);
            const email = document.getElementById('adm-email').value;
            const s = await db.ref('users/' + uid + '/credits').once('value');
            let total = type === 'add' ? (s.val()||0) + amt : (s.val()||0) - amt;
            await db.ref('users/' + uid).update({ credits: total });
            if(email) emailjs.send("service_2gd65tf", "template_750es5r", { to_email: email, amount: amt });
            notify("BALANȚĂ ACTUALIZATĂ!");
        }

        async function addPromoCode() {
            const n = document.getElementById('new-coupon-name').value.toUpperCase();
            const p = parseInt(document.getElementById('new-coupon-percent').value);
            await db.ref('promo_codes/' + n).set({ percent: p });
            notify("CUPON SALVAT!");
        }

        function updateCouponList() {
            const l = document.getElementById('coupon-list'); l.innerHTML = "";
            Object.keys(activePromoCodes).forEach(k => {
                l.innerHTML += `<div>${k} (${activePromoCodes[k].percent}%) <button onclick="db.ref('promo_codes/${k}').remove()">X</button></div>`;
            });
        }

        function login() { window.location.href = `https://discord.com/api/oauth2/authorize?client_id=1399681327741272096&redirect_uri=${encodeURIComponent(window.location.origin + window.location.pathname)}&response_type=token&scope=identify`; }
        function openAdminWithPass() { if(prompt("PAROLA:") === ADMIN_PASS) { document.getElementById('admin-modal').style.display = 'flex'; loadAdminReqs(); } }
        function showPage(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { window.location.hash = ""; window.location.reload(); }
        checkAuth();
    </script>
</body>
</html>
