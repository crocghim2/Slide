<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Romania | Shop & Gift</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --verde: #2ecc71; --rosu: #e74c3c; --bg: #0a0a0a; --panel: #111; --border: #222; }
        * { box-sizing: border-box; outline: none; font-family: 'Rajdhani', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #000; border-right: 2px solid var(--verde); display: flex; flex-direction: column; padding: 20px; }
        .logo { font-size: 35px; font-weight: 800; color: var(--verde); text-align: center; margin-bottom: 30px; letter-spacing: 5px; }
        .nav-item { padding: 15px; cursor: pointer; color: #666; font-weight: 700; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(46, 204, 113, 0.1); border-left-color: var(--verde); }
        .nav-admin { border: 1px solid var(--rosu); color: var(--rosu); margin-top: 20px; text-align: center; }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-box { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-verde { background: var(--verde); color: #000; }
        .btn-verde:hover { background: white; transform: scale(1.02); }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal { background: #0a0a0a; border: 2px solid var(--verde); padding: 40px; border-radius: 25px; width: 450px; text-align: center; }
        
        #u-info-box { margin-top: auto; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 10px; }
        #u-credits { font-size: 28px; color: var(--verde); font-weight: 800; }
    </style>
</head>
<body>

    <div id="notif-container" style="position:fixed; top:20px; right:20px; z-index:9999;"></div>

    <div id="login-screen" style="position:fixed; inset:0; background:#000; z-index:10001; display:flex; align-items:center; justify-content:center; flex-direction:column;">
        <h1 style="color:var(--verde); letter-spacing:15px; font-size: 60px; margin: 0;">SLIDE</h1>
        <p style="color:#333; margin-bottom:30px;">PREMIUM SHOP SYSTEM</p>
        <button onclick="login()" class="btn btn-verde" style="width:auto; padding:18px 50px;">AUTENTIFICARE DISCORD</button>
    </div>

    <div class="sidebar">
        <div class="logo">SLIDE</div>
        <div class="nav-item active" id="nav-home" onclick="showPage('home')">HUB PRINCIPAL</div>
        <div class="nav-item" id="nav-redeem" onclick="showPage('redeem')">🎁 REDEEM CODE</div>
        <div class="nav-admin" onclick="openAdmin()">PANOUL FONDATOR</div>
        
        <div id="u-info-box">
            <div id="u-name" style="font-weight: 800; color: #fff;">...</div>
            <div id="u-credits">0 CR</div>
        </div>
    </div>

    <div class="main">
        <div id="home" class="page">
            <div class="card">
                <h1 style="color:var(--verde);">BINE AI VENIT!</h1>
                <p style="color:#888; font-size: 18px;">Toate codurile cadou sunt trimise pe email-ul personal. Odată primit, introdu-l în secțiunea de Redeem.</p>
            </div>
        </div>

        <div id="redeem" class="page" style="display:none;">
            <div class="card" style="max-width:500px; margin:auto; text-align:center;">
                <h2 style="margin-bottom:20px;">ACTIVEAZĂ CODUL</h2>
                <input type="text" id="r-input" class="input-box" placeholder="XXXX-XXXX-XXXX" style="text-align:center; text-transform:uppercase; font-size: 20px; letter-spacing: 2px;">
                <button class="btn btn-verde" onclick="redeemCod()">RECLAMĂ CREDITE</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="overlay">
        <div class="modal">
            <h2 style="color:var(--verde); margin-top:0;">GENERATOR GIFT CARD</h2>
            
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="font-size: 12px; color: #555;">EMAIL DESTINATAR</label>
                <input type="email" id="adm-email" class="input-box" placeholder="exemplu@gmail.com">
                
                <label style="font-size: 12px; color: #555;">SUMĂ CREDITE</label>
                <input type="number" id="adm-credits" class="input-box" placeholder="1000">
            </div>
            
            <button class="btn btn-verde" onclick="generateAndSendCode()">TRIMITE PE EMAIL</button>
            <button class="btn" style="background:transparent; color:#444; margin-top:10px;" onclick="closeModal()">ÎNCHIDE</button>
        </div>
    </div>

    <script>
        // DATELE TALE CONFIGURATE
        const EMAILJS_PUBLIC_KEY = "j1cFRV1nuCdva_QHu";
        const EMAILJS_SERVICE_ID = "service_2gd65tf";
        const EMAILJS_TEMPLATE_ID = "template_ou7sc0j";
        const ADMIN_PASS = "ss-croc";

        emailjs.init(EMAILJS_PUBLIC_KEY);
        firebase.initializeApp({ databaseURL: "https://slideromania-7db7d-default-rtdb.europe-west1.firebasedatabase.app" });
        const db = firebase.database();
        let user = null;

        function notify(msg) {
            const n = document.createElement('div');
            n.style = 'background:#000; color:white; padding:15px 25px; border-left:5px solid var(--verde); border-radius:5px; margin-bottom:10px; border:1px solid #222; box-shadow: 0 5px 15px rgba(0,0,0,0.4);';
            n.innerText = msg; document.getElementById('notif-container').appendChild(n);
            setTimeout(() => n.remove(), 4000);
        }

        // DISCORD LOGIN
        function login() { window.location.href = `https://discord.com/api/oauth2/authorize?client_id=1399681327741272096&redirect_uri=${encodeURIComponent(window.location.origin + window.location.pathname)}&response_type=token&scope=identify`; }
        
        async function checkAuth() {
            const h = new URLSearchParams(window.location.hash.slice(1));
            const t = h.get('access_token');
            if(t) {
                const r = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${t}` } });
                user = await r.json();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('u-name').innerText = user.username.toUpperCase();
                db.ref('users/' + user.id + '/credits').on('value', s => document.getElementById('u-credits').innerText = (s.val() || 0).toLocaleString() + " CR");
            }
        }

        // ADMIN: GENERARE SI TRIMITERE
        async function generateAndSendCode() {
            const email = document.getElementById('adm-email').value.trim();
            const credits = parseInt(document.getElementById('adm-credits').value);

            if(!email || isNaN(credits)) return notify("⚠️ COMPLETEAZĂ TOATE DATELE!");

            // Generare Cod Unic
            const randomCode = "SLIDE-" + Math.random().toString(36).substr(2, 8).toUpperCase();

            // Salvare in Firebase
            await db.ref('gift_codes/' + randomCode).set({
                value: credits,
                sent_to: email,
                timestamp: Date.now()
            });

            // Trimitere Email prin EmailJS
            const params = {
                to_email: email,
                generated_code: randomCode,
                credits: credits
            };

            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params)
                .then(() => {
                    notify("✅ COD TRIMIS CĂTRE " + email);
                    document.getElementById('adm-email').value = "";
                    document.getElementById('adm-credits').value = "";
                }, (err) => {
                    notify("❌ EROARE EMAILJS!");
                });
        }

        // USER: REDEEM
        async function redeemCod() {
            if(!user) return notify("CONECTEAZĂ-TE!");
            const code = document.getElementById('r-input').value.trim().toUpperCase();
            if(!code) return notify("INTRODU UN COD!");

            const snap = await db.ref('gift_codes/' + code).once('value');
            
            if(snap.exists()) {
                const creditValue = snap.val().value;
                const userSnap = await db.ref('users/' + user.id + '/credits').once('value');
                const current = userSnap.val() || 0;

                await db.ref('users/' + user.id).update({ credits: current + creditValue });
                await db.ref('gift_codes/' + code).remove();

                notify(`🔥 SUCCES! AI PRIMIT ${creditValue} CREDITE!`);
                document.getElementById('r-input').value = "";
            } else {
                notify("❌ COD INVALID SAU EXPIRAT!");
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            document.getElementById('nav-' + id).classList.add('active');
        }

        function openAdmin() {
            const p = prompt("PAROLA ADMIN:");
            if(p === ADMIN_PASS) document.getElementById('admin-modal').style.display = 'flex';
            else notify("PAROLA INCORECTĂ!");
        }

        function closeModal() { document.getElementById('admin-modal').style.display = 'none'; }

        checkAuth();
    </script>
</body>
</html>
