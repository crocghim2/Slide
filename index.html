<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Romania | Hub Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --verde: #2ecc71; --rosu: #e74c3c; --bg: #0a0a0a; --panel: #111; --border: #222; --discord: #7289da; }
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Rajdhani', sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: #000; border-right: 2px solid var(--verde); display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { padding: 30px; font-size: 35px; font-weight: 800; color: var(--verde); text-align: center; letter-spacing: 3px; cursor: pointer; }
        .nav-item { padding: 18px 25px; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; font-weight: 700; text-transform: uppercase; color: #666; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(46, 204, 113, 0.1); border-left-color: var(--verde); }

        /* MAIN */
        .main { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .sold { border: 2px solid var(--verde); padding: 8px 20px; color: var(--verde); font-weight: 800; border-radius: 5px; font-size: 18px; }

        /* NOTIFICARI MODERNE */
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 11000; }
        .toast { background: #111; border-left: 4px solid var(--verde); color: white; padding: 15px 25px; margin-bottom: 10px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; }
        .toast.error { border-left-color: var(--rosu); }

        /* ADMIN PANEL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: #111; border: 2px solid var(--verde); padding: 30px; border-radius: 15px; width: 90%; max-width: 850px; max-height: 85vh; overflow-y: auto; }
        .request-item { background: #080808; border: 1px solid #222; padding: 20px; border-radius: 10px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .request-img { width: 100%; border-radius: 5px; cursor: pointer; border: 1px solid #333; }

        /* UI ELEMENTS */
        .btn { width: 100%; padding: 12px; background: var(--verde); color: black; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; border-radius: 4px; font-family: 'Rajdhani'; }
        .btn:hover { background: white; }
        .input-box { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; font-family: 'Rajdhani'; border-radius: 4px; }

        .page { display: none; }
        .page.active { display: block; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div id="login-overlay" style="position:fixed; inset:0; background:#0a0a0a; z-index:10001; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center; border:2px solid var(--verde); padding:50px; border-radius:15px; background:#000;">
            <h1 style="color:var(--verde); margin:0; letter-spacing:4px;">SLIDE ROMANIA</h1>
            <button onclick="loginDiscord()" class="btn" style="background:var(--discord); color:white; width:auto; padding: 15px 40px; margin-top:20px;">LOGARE CU DISCORD</button>
        </div>
    </div>

    <div id="admin-panel" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color:var(--verde); margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;">ADMIN PANEL</h2>
            
            <div style="background:#000; padding:20px; border:1px solid #222; border-radius:10px; margin-bottom:20px;">
                <h3 style="margin-top:0;">➕ ADĂUGARE MANUALĂ</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <input type="text" id="adm-id" class="input-box" placeholder="ID Discord Jucător">
                    <input type="number" id="adm-amt" class="input-box" placeholder="Sumă Credite">
                </div>
                <input type="email" id="adm-email" class="input-box" placeholder="Email Jucător (pt. notificare)">
                <button class="btn" onclick="manualAdd()">ADĂUGĂ & TRIMITE EMAIL</button>
            </div>

            <h3 style="border-bottom:1px solid #333; padding-bottom:10px;">📩 CERERI SITE</h3>
            <div id="requests-list">Se încarcă...</div>
            <button class="btn" onclick="closeModal('admin-panel')" style="background:var(--rosu); color:white; margin-top:20px;">ÎNCHIDE</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="logo" onclick="handleLogoClick()">SLIDE</div>
        <div class="nav-item active" onclick="showPage('home')">🏠 HUB</div>
        <div class="nav-item" onclick="showPage('dovezi')">📸 TRIMITE DOVADA</div>
        <div style="margin-top:auto; padding:20px;"><button class="btn" style="background:var(--rosu); color:white; font-size:12px;" onclick="location.reload()">LOGOUT</button></div>
    </div>

    <div class="main">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <img id="u-avatar" style="width:45px; height:45px; border-radius:50%; border:2px solid var(--verde); display:none;">
                <div style="font-weight:700; font-size:18px;">SALUT, <span id="u-name" style="color:var(--verde);">...</span></div>
            </div>
            <div class="sold"><span id="u-sold">0</span> CREDITE</div>
        </div>

        <div id="home" class="page active">
            <div style="background:var(--panel); padding:30px; border-radius:15px; border-left:5px solid var(--verde);">
                <h1>BINE AI VENIT PE HUB!</h1>
                <p style="color:#888;">Folosește meniul din stânga pentru a naviga. Orice donație este verificată de admini.</p>
            </div>
        </div>

        <div id="dovezi" class="page">
            <h2>📸 TRIMITE DOVADA</h2>
            <div style="max-width:500px; background:var(--panel); padding:30px; border-radius:15px; border:1px solid var(--border);">
                <input type="email" id="d-email" class="input-box" placeholder="Email-ul tău (pt. confirmare)">
                <input type="text" id="d-idjoc" class="input-box" placeholder="ID-ul tău din joc">
                <input type="number" id="d-credite" class="input-box" placeholder="Suma de credite donată">
                <input type="file" id="d-file" class="input-box" accept="image/*" style="padding:10px;">
                <button class="btn" onclick="sendDovada()">TRIMITE DOVADA</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIG
        const firebaseConfig = { databaseURL: "https://slideromania-7db7d-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const WEBHOOK = "https://discord.com/api/webhooks/1392066262015934484/3oRr_5nkjthX7JQHgmJpW0JIQkp_NeMixIUhYOgCqBcFX1HEA6oEBuEPXFepwrrOC7Ln";
        
        // EMAILJS INIT
        emailjs.init("j1cFRV1nuCdva_QHu");

        let user = null;
        let logoClicks = 0;

        function notify(msg, type = 'success') {
            const container = document.getElementById('notification-container');
            const t = document.createElement('div'); t.className = `toast ${type === 'error' ? 'error' : ''}`;
            t.innerText = msg; container.appendChild(t); setTimeout(() => t.remove(), 4500);
        }

        // JUCATOR: TRIMITE DOVADA
        async function sendDovada() {
            const email = document.getElementById('d-email').value;
            const idj = document.getElementById('d-idjoc').value;
            const amt = document.getElementById('d-credite').value;
            const file = document.getElementById('d-file').files[0];
            if(!email || !idj || !amt || !file) return notify("Completează toate câmpurile!", "error");

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result;
                const reqId = Date.now();
                
                await db.ref('pending_donations/' + reqId).set({
                    uid: user.id, username: user.username, email: email, id_joc: idj, amount: parseInt(amt), image: base64
                });

                const formData = new FormData();
                formData.append('payload_json', JSON.stringify({
                    content: `📩 **DOVADĂ NOUĂ SITE**\n👤 De la: <@${user.id}>\n🎮 ID Joc: \`${idj}\`\n💎 Credite: **${amt}**\n📧 Email: \`${email}\``
                }));
                formData.append('file', file);
                await fetch(WEBHOOK, { method: 'POST', body: formData });

                notify("Dovada a fost trimisă!");
                document.getElementById('d-idjoc').value = ""; document.getElementById('d-credite').value = "";
            };
        }

        // ADMIN: APROBARE + EMAIL
        async function approve(reqId, uid, amt, email, name) {
            try {
                // 1. Bagă credite
                const snap = await db.ref('users/' + uid + '/credits').once('value');
                const current = snap.val() || 0;
                await db.ref('users/' + uid).update({ credits: current + amt });
                
                // 2. Trimite Email
                console.log("Trimitere email catre:", email);
                emailjs.send("service_2gd65tf", "template_750es5r", {
                    to_email: email, 
                    to_name: name,
                    amount: amt
                }).then(() => {
                    console.log("Email trimis!");
                    notify("Aprobat și Email trimis!");
                }).catch(err => {
                    console.error("Eroare EmailJS:", err);
                    notify("Credite date, dar e-mail-ul a eșuat!", "error");
                });

                // 3. Șterge cererea & Log Discord
                await db.ref('pending_donations/' + reqId).remove();
                fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({
                    content: `✅ **DONAȚIE APROBATĂ**\n👤 Admin: <@${user.id}>\n👤 Jucător: <@${uid}>\n💰 Sumă: **${amt} credite**`
                })});

            } catch (e) { notify("Eroare la procesare!", "error"); }
        }

        // ADMIN: ADAUGARE MANUALA + EMAIL
        async function manualAdd() {
            const tid = document.getElementById('adm-id').value;
            const amt = parseInt(document.getElementById('adm-amt').value);
            const email = document.getElementById('adm-email').value;
            if(!tid || isNaN(amt)) return notify("Date invalide!", "error");

            const snap = await db.ref('users/' + tid + '/credits').once('value');
            const current = snap.val() || 0;
            await db.ref('users/' + tid).update({ credits: current + amt });

            if(email) {
                emailjs.send("service_2gd65tf", "template_750es5r", { to_email: email, to_name: tid, amount: amt })
                .then(() => notify("Credite & Email trimis!"))
                .catch(() => notify("Credite date, dar Email EȘUAT", "error"));
            } else {
                notify("Credite adăugate manual!");
            }
            
            fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({
                content: `🛠️ **MANUAL ADD**\n👤 Admin: <@${user.id}>\n👤 Primitor: \`${tid}\`\n💰 Sumă: **${amt} credite**`
            })});
        }

        // CORE UTILS
        function handleLogoClick() { logoClicks++; if(logoClicks >= 5) { openAdminPanel(); logoClicks=0; } setTimeout(()=>logoClicks=0, 2000); }
        function openAdminPanel() {
            document.getElementById('admin-panel').style.display = 'flex';
            const list = document.getElementById('requests-list');
            db.ref('pending_donations').on('value', snap => {
                list.innerHTML = "";
                const data = snap.val();
                if(!data) { list.innerHTML = "Nicio cerere."; return; }
                for(let id in data) {
                    const r = data[id];
                    const div = document.createElement('div'); div.className = 'request-item';
                    div.innerHTML = `<img src="${r.image}" class="request-img" onclick="window.open(this.src)">
                        <div><p><b>${r.username}</b> (ID Joc: ${r.id_joc})</p><p>Suma: ${r.amount} cr</p>
                        <button class="btn" onclick="approve('${id}', '${r.uid}', ${r.amount}, '${r.email}', '${r.username}')">APROBĂ</button>
                        <button class="btn" style="background:var(--rosu); color:white; margin-top:5px; font-size:10px;" onclick="db.ref('pending_donations/${id}').remove()">REFUZĂ</button></div>`;
                    list.appendChild(div);
                }
            });
        }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function loginDiscord() { window.location.href = `https://discord.com/api/oauth2/authorize?client_id=1399681327741272096&redirect_uri=${encodeURIComponent(window.location.origin + window.location.pathname)}&response_type=token&scope=identify`; }
        async function checkAuth() {
            const frag = new URLSearchParams(window.location.hash.slice(1));
            const token = frag.get('access_token');
            if (token) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
                user = await res.json();
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('u-name').innerText = user.username.toUpperCase();
                if(user.avatar) { document.getElementById('u-avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`; document.getElementById('u-avatar').style.display='block'; }
                db.ref('users/' + user.id + '/credits').on('value', s => { document.getElementById('u-sold').innerText = s.val() || 0; });
            }
        }
        checkAuth();
    </script>
</body>
</html>
